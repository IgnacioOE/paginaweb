<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokemon</title>
    <script src="backend/auth.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            margin: 0;
            font-family: Arial;
            text-align: center;
            background-color: #f0f0f0;
        }
        .catalog-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
            max-width: 1200px;
            margin: 0 auto;
        }
        .catalog-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            text-transform: capitalize;
        }
        .catalog-item:hover {
            transform: scale(1.05);
        }
        .catalog-item img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }
        .controls-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            margin-top: 10px;
        }
        .controls-container input, .controls-container select {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 1em;
        }
        .controls-container input {
            width: 300px;
        }
    </style>
</head>
<body>
    
    <script src="components/navbar.js"></script>
    
    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="Buscar por nombre o número...">
        <select id="typeFilter">
            <option value="">Todos los tipos</option>
        </select>
    </div>

    <div class="catalog-container" id="catalogList">
        <p style="grid-column: 1 / -1;">Cargando Pokédex...</p>
    </div>

    <script src="components/footer.js"></script>
    <script src="components/pokemonCard.js"></script>
    <script src="backend/pokefetch.js"></script>
</body>
</html>
